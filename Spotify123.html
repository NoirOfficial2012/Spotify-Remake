<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Spotify Premium Free</title>
<style>
    :root {
        --green: #1db954;
        --bg: #0f0f0f;
        --sidebar-bg: #000;
        --card-bg: #181818;
        --hover-bg: #282828;
        --text: #fff;
        --text-secondary: #aaa;
        --search-bg: #282828;
        --player-bg: #181818;
    }

    [data-theme="light"] {
        --bg: #f8f8f8;
        --sidebar-bg: #ffffff;
        --card-bg: #ffffff;
        --hover-bg: #f0f0f0;
        --text: #1a1a1a;
        --text-secondary: #666;
        --search-bg: #f0f0f0;
        --player-bg: #ffffff;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
        overflow: hidden;
        transition: background 0.3s, color 0.3s;
    }

    .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        padding: 20px;
        overflow-y: auto;
        border-right: 1px solid #282828;
    }

    [data-theme="light"] .sidebar {
        border-right: 1px solid #ddd;
    }

    .main {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: linear-gradient(to bottom, #1f1f1f, var(--bg));
    }

    [data-theme="light"] .main {
        background: linear-gradient(to bottom, #f0f0f0, var(--bg));
    }

    .top {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }

    .search-container {
        flex: 1;
        max-width: 380px;           /* Smaller search bar */
        position: relative;
    }

    .search-bar {
        width: 100%;
        background: var(--search-bg);
        border: none;
        padding: 12px 20px 12px 50px;
        border-radius: 30px;
        color: var(--text);
        font-size: 15px;
    }

    .search-bar:focus {
        outline: none;
        background: #333;
        box-shadow: 0 0 0 2px var(--green);
    }

    [data-theme="light"] .search-bar:focus {
        background: white;
    }

    .search-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
    }

    .clear-btn {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        display: none;
    }

    .theme-toggle {
        background: none;
        border: none;
        font-size: 22px;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 8px 10px;
        border-radius: 50%;
        transition: all 0.3s;
    }

    .theme-toggle:hover {
        background: var(--hover-bg);
        color: var(--text);
    }

    button {
        background: var(--green);
        border: none;
        padding: 10px 16px;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        font-weight: 600;
    }

    .nav-item, .playlist-item {
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .nav-item:hover, .playlist-item:hover, .active {
        background: var(--hover-bg);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--card-bg);
        padding: 12px;
        border-radius: 12px;
        transition: all 0.2s;
        cursor: pointer;
        position: relative;
    }

    .card:hover {
        background: var(--hover-bg);
        transform: translateY(-4px);
    }

    .card img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 12px;
    }

    .song {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        position: relative;
        background: var(--card-bg);
    }

    .song:hover {
        background: var(--hover-bg);
    }

    .song img {
        width: 50px;
        height: 50px;
        border-radius: 4px;
        object-fit: cover;
    }

    .action-btn {
        position: absolute;
        top: 10px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
    }

    .add-btn { right: 50px; background: rgba(0,0,0,0.7); }
    .fav-btn { right: 85px; background: rgba(0,0,0,0.7); color: #ff4d4d; }
    .remove-btn { right: 10px; background: rgba(220, 53, 69, 0.85); }

    .card:hover .action-btn,
    .song:hover .action-btn {
        display: flex;
    }

    .player {
        position: fixed;
        bottom: 0;
        left: 260px;
        right: 0;
        background: var(--player-bg);
        border-top: 1px solid #282828;
        padding: 12px 20px;
        display: none;
        align-items: center;
        gap: 20px;
        z-index: 100;
    }

    [data-theme="light"] .player {
        border-top: 1px solid #ddd;
    }

    .now-playing {
        display: flex;
        align-items: center;
        gap: 15px;
        min-width: 250px;
    }

    .now-playing img {
        width: 56px;
        height: 56px;
        border-radius: 6px;
    }

    .controls {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .control-buttons i {
        font-size: 18px;
        cursor: pointer;
        color: var(--text-secondary);
    }

    .control-buttons i:hover { color: var(--text); transform: scale(1.1); }
    .control-buttons .play-pause { font-size: 32px; color: var(--text); }

    .progress-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
    }

    .progress-bar {
        flex: 1;
        height: 4px;
        background: #404040;
        border-radius: 999px;
        position: relative;
        cursor: pointer;
    }

    [data-theme="light"] .progress-bar {
        background: #ddd;
    }

    .progress {
        height: 100%;
        background: var(--green);
        width: 0%;
        border-radius: 999px;
    }

    .volume {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 180px;
    }

    .volume-bar {
        flex: 1;
        height: 4px;
        background: #404040;
        border-radius: 999px;
        cursor: pointer;
    }

    [data-theme="light"] .volume-bar {
        background: #ddd;
    }
</style>
</head>
<body data-theme="dark">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="nav-item active" id="homeBtn">
        <i class="fas fa-home"></i> Home
    </div>
    <div class="nav-item" id="favBtn">
        <i class="fas fa-heart"></i> Favorites
    </div>
    <h2>Playlists</h2>
    <div id="playlistList"></div>
    <button onclick="createPlaylist()" style="width:100%; margin-top:15px;">+ New Playlist</button>
</div>

<!-- MAIN -->
<div class="main">
    <div class="top">
        <h1 id="pageTitle">All Songs</h1>
        
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="What do you want to play?" onkeyup="handleSearch()">
            <button class="clear-btn" id="clearSearch">✕</button>
        </div>

        <div style="display:flex; gap:10px; margin-left:auto; align-items:center;">
            <button onclick="renamePlaylist()">Rename</button>
            <button onclick="deletePlaylist()">Delete</button>
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>
    <div id="content"></div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
    <div class="now-playing">
        <img id="playerCover" src="" alt="">
        <div>
            <div id="playerTitle" style="font-weight:600;"></div>
            <div id="playerArtist" style="font-size:14px; color:var(--text-secondary);"></div>
        </div>
    </div>
    <div class="controls">
        <div class="control-buttons">
            <i class="fas fa-step-backward" id="prevBtn"></i>
            <i class="fas fa-play-circle play-pause" id="playPauseBtn"></i>
            <i class="fas fa-step-forward" id="nextBtn"></i>
        </div>
       
        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <span id="duration">0:00</span>
        </div>
    </div>
    <div class="volume">
        <i class="fas fa-volume-up"></i>
        <div class="volume-bar" id="volumeBar">
            <div class="progress" id="volumeProgress" style="width:70%"></div>
        </div>
    </div>
</div>

<audio id="audio" style="display:none"></audio>

<script>
// ====================== DATA ======================
const songs = [
    { id: 1, title: "Ordinary", artist: "Alex Warren", audio: "https://files.catbox.moe/4wbgkx.mp3", cover: "https://i.scdn.co/image/ab67616d0000b273457cfd5a54720ab3b0820064" },
    { id: 2, title: "I Wanna Be Yours", artist: "Arctic Monkeys", audio: "https://files.catbox.moe/p5gn3d.mp3", cover: "https://i.scdn.co/image/ab67616d0000b2734ae1c4c5c45aabe565499163" },
    { id: 3, title: "Just A Boy", artist: "DrINsaNE", audio: "https://files.catbox.moe/r74j53.mp3", cover: "https://i.scdn.co/image/ab67616d0000b27381268372598aa7a73abece19" },
    { id: 4, title: "Let me down slowly", artist: "Alec Benjamin", audio: "https://files.catbox.moe/fpz16j.mp3", cover: "https://i.scdn.co/image/ab67616d0000b2731b6da489c1cb4c5a301a17fc" },
    { id: 4, title: "Sahiba", artist: "Aditya Rikhari", audio: "https://files.catbox.moe/9wqv0u.mp3", cover: "https://i.scdn.co/image/ab67616d0000b2730a47bbe7141fdfe0eb2cdba7" },
    { id: 5, title: "Shape Of You", artist: "Ed Sheeran", audio: "https://files.catbox.moe/m5nj2t.mp3", cover: "https://i.scdn.co/image/ab67616d0000b273ba5db46f4b838ef6027e6f96" },
    { id: 5, title: "Metro Boomin", artist: "Chris Brown", audio: "https://files.catbox.moe/uzxi5q.mp3", cover: "https://i.scdn.co/image/ab67616d00001e024a3cdc1e547b3d275d97cff8" },
    { id: 5, title: "What Makes You Beautiful", artist: "1 Direction", audio: "https://files.catbox.moe/4de2oo.mp3", cover: "https://i.scdn.co/image/ab67616d0000b2734a5584795dc73860653a9a3e" },
    { id: 5, title: "Death Bed (Coffee For Your Head) ", artist: "Powfu, beabadoobee", audio: "https://files.catbox.moe/aamhmj.mp3", cover: "https://i.scdn.co/image/ab67616d0000b273bf01fd0986a195d485922167" }

    
];

let playlists = JSON.parse(localStorage.getItem("playlists")) || {};
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let currentPlaylist = "all";
let currentQueue = [];
let currentSongIndex = 0;
let currentSearchTerm = "";

if (!playlists["Favorites"]) playlists["Favorites"] = [];

// ====================== ELEMENTS ======================
const audio = document.getElementById("audio");
const player = document.getElementById("player");
const searchInput = document.getElementById("searchInput");
const clearSearchBtn = document.getElementById("clearSearch");
const playlistList = document.getElementById("playlistList");
const content = document.getElementById("content");
const pageTitle = document.getElementById("pageTitle");
const themeToggle = document.getElementById("themeToggle");

// ====================== THEME ======================
function toggleTheme() {
    const currentTheme = document.body.getAttribute("data-theme");
    if (currentTheme === "dark") {
        document.body.setAttribute("data-theme", "light");
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    } else {
        document.body.setAttribute("data-theme", "dark");
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    }
}
themeToggle.addEventListener("click", toggleTheme);

// ====================== RENDER SIDEBAR ======================
function renderSidebar() {
    playlistList.innerHTML = "";
    Object.keys(playlists).forEach(name => {
        if (name === "Favorites") return;
        const div = document.createElement("div");
        div.className = `playlist-item ${name === currentPlaylist ? 'active' : ''}`;
        div.innerHTML = `<i class="fas fa-music"></i> ${name}`;
        div.onclick = () => openPlaylist(name);
        playlistList.appendChild(div);
    });
}

// ====================== NAV BUTTONS ======================
document.getElementById("favBtn").onclick = () => openPlaylist("Favorites");
document.getElementById("homeBtn").onclick = () => {
    currentPlaylist = "all";
    document.querySelectorAll('.nav-item, .playlist-item').forEach(el => el.classList.remove('active'));
    document.getElementById("homeBtn").classList.add('active');
    renderHome();
};

// ====================== SEARCH ======================
searchInput.addEventListener("input", handleSearch);
clearSearchBtn.addEventListener("click", () => {
    searchInput.value = "";
    currentSearchTerm = "";
    clearSearchBtn.style.display = "none";
    if (currentPlaylist === "all") renderHome();
    else openPlaylist(currentPlaylist);
});

function handleSearch() {
    currentSearchTerm = searchInput.value.toLowerCase().trim();
    clearSearchBtn.style.display = currentSearchTerm ? "block" : "none";
    if (currentPlaylist === "all") renderHome();
    else openPlaylist(currentPlaylist);
}

// ====================== RENDER HOME ======================
function renderHome() {
    currentPlaylist = "all";
    pageTitle.innerText = "All Songs";
    let filtered = songs;
    if (currentSearchTerm) {
        filtered = songs.filter(s =>
            s.title.toLowerCase().includes(currentSearchTerm) ||
            s.artist.toLowerCase().includes(currentSearchTerm)
        );
    }
    content.innerHTML = `<div class="grid" id="songGrid"></div>`;
    const grid = document.getElementById("songGrid");
    filtered.forEach(song => {
        const isFav = favorites.includes(song.audio);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${song.cover}">
            <div style="font-weight:600;">${song.title}</div>
            <div style="font-size:14px;color:var(--text-secondary);">${song.artist}</div>
            <button class="action-btn add-btn" title="Add to playlist"><i class="fas fa-plus"></i></button>
            <button class="action-btn fav-btn" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
                <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
            </button>
        `;
        card.onclick = (e) => {
            if (!e.target.closest('.action-btn')) playFromQueue(songs, songs.indexOf(song));
        };
        card.querySelector('.add-btn').onclick = (e) => {
            e.stopImmediatePropagation();
            showAddToPlaylistMenu(song.audio);
        };
        card.querySelector('.fav-btn').onclick = (e) => {
            e.stopImmediatePropagation();
            toggleFavorite(song.audio);
        };
        grid.appendChild(card);
    });
}

// ====================== FAVORITES ======================
function toggleFavorite(audioUrl) {
    if (favorites.includes(audioUrl)) {
        favorites = favorites.filter(url => url !== audioUrl);
    } else {
        favorites.push(audioUrl);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
   
    if (currentPlaylist === "all") renderHome();
    else if (currentPlaylist === "Favorites") openPlaylist("Favorites");
    else openPlaylist(currentPlaylist);
}

// ====================== ADD TO PLAYLIST ======================
function showAddToPlaylistMenu(audioUrl) {
    if (Object.keys(playlists).length === 0) {
        alert("Create a playlist first!");
        return;
    }
    let menuHTML = `<h3 style='margin:0 0 15px 0'>Add to Playlist</h3><ul style='list-style:none;padding:0;margin:0'>`;
    Object.keys(playlists).forEach(name => {
        if (name === "Favorites") return;
        menuHTML += `
            <li style="padding:10px 12px;cursor:pointer;border-radius:6px"
                onmouseover="this.style.background='#333'"
                onmouseout="this.style.background='transparent'"
                onclick="addSongToPlaylist('${audioUrl}', '${name}');">
                ${name}
            </li>`;
    });
    menuHTML += "</ul>";
    const modal = document.createElement("div");
    modal.style.cssText = `position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#282828; padding:20px; border-radius:12px; z-index:1000; min-width:280px; box-shadow:0 10px 30px rgba(0,0,0,0.5);`;
    modal.innerHTML = menuHTML;
    document.body.appendChild(modal);
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

window.addSongToPlaylist = function(audioUrl, playlistName) {
    const modal = document.querySelector('div[style*="position:fixed"]');
    if (!playlists[playlistName].includes(audioUrl)) {
        playlists[playlistName].push(audioUrl);
        savePlaylists();
        if (modal) modal.remove();
        alert(`✅ Added to "${playlistName}"`);
        if (currentPlaylist === playlistName) openPlaylist(playlistName);
    } else {
        if (modal) modal.remove();
        alert("Song already exists in this playlist!");
    }
};

// ====================== REMOVE FROM PLAYLIST ======================
window.removeFromPlaylist = function(audioUrl) {
    if (currentPlaylist === "all" || currentPlaylist === "Favorites") return;
    const song = songs.find(s => s.audio === audioUrl);
    if (confirm(`Remove "${song.title}" from "${currentPlaylist}"?`)) {
        playlists[currentPlaylist] = playlists[currentPlaylist].filter(url => url !== audioUrl);
        savePlaylists();
        openPlaylist(currentPlaylist);
    }
};

// ====================== OPEN PLAYLIST ======================
function openPlaylist(name) {
    currentPlaylist = name;
    pageTitle.innerText = name === "Favorites" ? "Favorites" : name;
    document.querySelectorAll('.nav-item, .playlist-item').forEach(el => el.classList.remove('active'));
    let list = name === "Favorites" ? favorites : (playlists[name] || []);
    if (currentSearchTerm) {
        list = list.filter(audioUrl => {
            const song = songs.find(s => s.audio === audioUrl);
            return song && (song.title.toLowerCase().includes(currentSearchTerm) || song.artist.toLowerCase().includes(currentSearchTerm));
        });
    }
    content.innerHTML = `<div id="songList"></div>`;
    const songListEl = document.getElementById("songList");
    list.forEach((audioUrl, index) => {
        const song = songs.find(s => s.audio === audioUrl);
        if (!song) return;
        const isFav = favorites.includes(audioUrl);
        const div = document.createElement("div");
        div.className = "song";
        div.innerHTML = `
            <img src="${song.cover}">
            <div style="flex:1">
                <div>${song.title}</div>
                <div style="font-size:14px;color:var(--text-secondary);">${song.artist}</div>
            </div>
            <button class="action-btn add-btn" title="Add to another playlist"><i class="fas fa-plus"></i></button>
            <button class="action-btn fav-btn" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
                <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
            </button>
            ${name !== "Favorites" ? `<button class="action-btn remove-btn" title="Remove from playlist" onclick="event.stopImmediatePropagation(); removeFromPlaylist('${audioUrl}');"><i class="fas fa-trash"></i></button>` : ''}
        `;
        div.onclick = (e) => {
            if (!e.target.closest('.action-btn')) {
                playFromQueue(list.map(url => songs.find(s => s.audio === url)).filter(Boolean), index);
            }
        };
        div.querySelector('.add-btn').onclick = (e) => { e.stopImmediatePropagation(); showAddToPlaylistMenu(audioUrl); };
        div.querySelector('.fav-btn').onclick = (e) => { e.stopImmediatePropagation(); toggleFavorite(audioUrl); };
        songListEl.appendChild(div);
    });
}

// ====================== PLAYER ======================
function playFromQueue(queue, index) {
    currentQueue = queue;
    currentSongIndex = index;
    playCurrentSong();
}

function playCurrentSong() {
    const song = currentQueue[currentSongIndex];
    if (!song) return;
    audio.src = song.audio;
    audio.play();
    player.style.display = "flex";
    document.getElementById("playerCover").src = song.cover;
    document.getElementById("playerTitle").textContent = song.title;
    document.getElementById("playerArtist").textContent = song.artist;
    document.getElementById("playPauseBtn").classList.replace("fa-play-circle", "fa-pause-circle");
}

const playPauseBtn = document.getElementById("playPauseBtn");
playPauseBtn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        playPauseBtn.classList.replace("fa-play-circle", "fa-pause-circle");
    } else {
        audio.pause();
        playPauseBtn.classList.replace("fa-pause-circle", "fa-play-circle");
    }
});

document.getElementById("nextBtn").addEventListener("click", () => {
    if (currentQueue.length === 0) return;
    currentSongIndex = (currentSongIndex + 1) % currentQueue.length;
    playCurrentSong();
});

document.getElementById("prevBtn").addEventListener("click", () => {
    if (currentQueue.length === 0) return;
    currentSongIndex = (currentSongIndex - 1 + currentQueue.length) % currentQueue.length;
    playCurrentSong();
});

audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    const percent = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("currentTime").textContent = formatTime(audio.currentTime);
    document.getElementById("duration").textContent = formatTime(audio.duration);
});

document.getElementById("progressBar").addEventListener("click", (e) => {
    const rect = document.getElementById("progressBar").getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
});

function formatTime(seconds) {
    if (!seconds) return "0:00";
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

document.getElementById("volumeBar").addEventListener("click", (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    audio.volume = Math.max(0, Math.min(1, percent));
    document.getElementById("volumeProgress").style.width = (percent * 100) + "%";
});

function savePlaylists() {
    localStorage.setItem("playlists", JSON.stringify(playlists));
}

function createPlaylist() {
    let name = prompt("Playlist name:");
    if (!name || playlists[name]) return alert("Invalid or duplicate name!");
    playlists[name] = [];
    savePlaylists();
    renderSidebar();
    openPlaylist(name);
}

function renamePlaylist() {
    if (currentPlaylist === "all" || currentPlaylist === "Favorites") return alert("Cannot rename this!");
    let newName = prompt("New name:", currentPlaylist);
    if (!newName || newName === currentPlaylist) return;
    playlists[newName] = playlists[currentPlaylist];
    delete playlists[currentPlaylist];
    currentPlaylist = newName;
    savePlaylists();
    renderSidebar();
    openPlaylist(newName);
}

function deletePlaylist() {
    if (currentPlaylist === "all" || currentPlaylist === "Favorites") return alert("Cannot delete this!");
    if (confirm(`Delete "${currentPlaylist}"?`)) {
        delete playlists[currentPlaylist];
        currentPlaylist = "all";
        savePlaylists();
        renderSidebar();
        renderHome();
    }
}

// ====================== INITIALIZE ======================
renderSidebar();
renderHome();
audio.volume = 0.7;
</script>
